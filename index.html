<!DOCTYPE html>
<html lag="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tableau de bord meteo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
    <h1>tableau de bord meteo dynamyque</h1>
</header>  
<main>
    <section class="recherche">
        <form id="meteoform">
            <label for="ville">Nom de la ville:</label>
            <input 
                  type="text"
                  id="ville"
                  placeholder="entrez une ville"
                  aria-description="erreurville">
            <small id="erreurville"></small>
            <button type="submit">
                rechercher
            </button>
            
          </form>
          <p id="chargement"></p>
    </section>
    <section id="resultat"></section>
</main> 
<footer>
    <p>projet API open-meteo</p>
</footer> 
<script src="js/app.js"></script>
</body>
</html>
